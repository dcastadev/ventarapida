# ============================================================
# VentaRapida - application.properties
# SQL Server local (desarrollo)
# ============================================================

# --- Base de datos SQL Server local ---
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=VentaRapidaDB;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=YourStrong@Passw0rd

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- Servidor ---
server.port=8080
server.servlet.context-path=/ventarapida

# --- Sesion (30 minutos) ---
server.servlet.session.timeout=30m

# --- Logs ---
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
