<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Iniciar Sesión — VentaRápida</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f0f4f8; }
        .login-card {
            max-width: 420px;
            margin: 90px auto;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: #fff;
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
        }
        .login-header h2 { font-weight: 700; letter-spacing: 1px; }
        .login-body { padding: 2rem; background: #fff; border-radius: 0 0 16px 16px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="bi bi-lightning-charge-fill fs-1 mb-2"></i>
        <h2>VentaRápida</h2>
        <p class="mb-0 opacity-75">Sistema de Punto de Venta</p>
    </div>
    <div class="login-body">

        <div th:if="${errorMsg}"
             class="alert alert-danger" th:text="${errorMsg}"></div>
        <div th:if="${logoutMsg}"
             class="alert alert-success" th:text="${logoutMsg}"></div>
        <div th:if="${expiredMsg}"
             class="alert alert-warning" th:text="${expiredMsg}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">
                    <i class="bi bi-person me-1"></i>Usuario
                </label>
                <input type="text" id="username" name="username"
                       class="form-control form-control-lg"
                       placeholder="Ingresa tu usuario" autofocus required/>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <input type="password" id="password" name="password"
                       class="form-control form-control-lg"
                       placeholder="Ingresa tu contraseña" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
        </form>

        <p class="text-center text-muted mt-3 small">
            © 2025 VentaRápida — CIBERTEC
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
