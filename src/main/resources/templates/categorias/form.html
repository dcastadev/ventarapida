<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-tag me-2"></i>
                        <span th:text="${modoEdicion} ? 'Editar Categoría' : 'Nueva Categoría'"></span>
                    </h5>
                </div>
                <div class="card-body p-4">

                    <!-- Guardar nueva -->
                    <form th:if="${!modoEdicion}"
                          th:action="@{/categorias/guardar}" method="post"
                          th:object="${categoria}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre *</label>
                            <input type="text" th:field="*{nombre}"
                                   class="form-control" required
                                   placeholder="Ej: Laptops"/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Descripción</label>
                            <textarea th:field="*{descripcion}"
                                      class="form-control" rows="3"
                                      placeholder="Descripción de la categoría"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/categorias}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>

                    <!-- Actualizar -->
                    <form th:if="${modoEdicion}"
                          th:action="@{/categorias/actualizar}" method="post"
                          th:object="${categoria}">
                        <input type="hidden" th:field="*{idCategoria}"/>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre *</label>
                            <input type="text" th:field="*{nombre}"
                                   class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Descripción</label>
                            <textarea th:field="*{descripcion}"
                                      class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Estado</label>
                            <select th:field="*{estado}" class="form-select">
                                <option value="1">Activo</option>
                                <option value="0">Inactivo</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save me-1"></i>Actualizar
                            </button>
                            <a th:href="@{/categorias}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
