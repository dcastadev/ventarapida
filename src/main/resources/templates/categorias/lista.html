<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-tags me-2 text-primary"></i>Categorías
        </h4>
        <a th:href="@{/categorias/nueva}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Nueva Categoría
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${categorias}">
                        <td th:text="${cat.idCategoria}" class="text-muted small"></td>
                        <td th:text="${cat.nombre}" class="fw-semibold"></td>
                        <td th:text="${cat.descripcion}"></td>
                        <td>
                            <span th:if="${cat.estado == '1'}"
                                  class="badge bg-success">Activo</span>
                            <span th:unless="${cat.estado == '1'}"
                                  class="badge bg-secondary">Inactivo</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/categorias/editar/{id}(id=${cat.idCategoria})}"
                               class="btn btn-sm btn-outline-warning me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/categorias/eliminar/{id}(id=${cat.idCategoria})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Desactivar esta categoría?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            No hay categorías registradas
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
