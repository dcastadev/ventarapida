<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-box-seam me-2"></i>
                        <span th:text="${modoEdicion} ? 'Editar Producto' : 'Nuevo Producto'"></span>
                    </h5>
                </div>
                <div class="card-body p-4">

                    <!-- GUARDAR NUEVO -->
                    <form th:if="${!modoEdicion}"
                          th:action="@{/productos/guardar}" method="post"
                          th:object="${producto}">

                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Nombre *</label>
                                <input type="text" th:field="*{nombre}"
                                       class="form-control" required
                                       placeholder="Ej: Laptop HP Pavilion 15"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Categoría *</label>
                                <select th:field="*{categoria.idCategoria}"
                                        class="form-select" required>
                                    <option value="">-- Selecciona --</option>
                                    <option th:each="c : ${categorias}"
                                            th:value="${c.idCategoria}"
                                            th:text="${c.nombre}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Marca *</label>
                                <input type="text" th:field="*{marca}"
                                       class="form-control" required
                                       placeholder="Ej: HP"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Modelo *</label>
                                <input type="text" th:field="*{modelo}"
                                       class="form-control" required
                                       placeholder="Ej: Pavilion 15-eh3"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Precio Venta (S/) *</label>
                                <input type="number" th:field="*{precioVenta}"
                                       class="form-control" required
                                       step="0.01" min="0.01"
                                       placeholder="0.00"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Stock inicial *</label>
                                <input type="number" th:field="*{stock}"
                                       class="form-control" required
                                       min="0" placeholder="0"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Stock mínimo *</label>
                                <input type="number" th:field="*{stockMinimo}"
                                       class="form-control" required
                                       min="1" placeholder="5"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Descripción</label>
                                <textarea th:field="*{descripcion}"
                                          class="form-control" rows="3"
                                          placeholder="Descripción del producto..."></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">URL de imagen</label>
                                <input type="text" th:field="*{imagenUrl}"
                                       class="form-control"
                                       placeholder="https://..."/>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/productos}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>

                    <!-- ACTUALIZAR -->
                    <form th:if="${modoEdicion}"
                          th:action="@{/productos/actualizar}" method="post"
                          th:object="${producto}">

                        <input type="hidden" th:field="*{idProducto}"/>

                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Nombre *</label>
                                <input type="text" th:field="*{nombre}"
                                       class="form-control" required/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Categoría *</label>
                                <select th:field="*{categoria.idCategoria}"
                                        class="form-select" required>
                                    <option value="">-- Selecciona --</option>
                                    <option th:each="c : ${categorias}"
                                            th:value="${c.idCategoria}"
                                            th:text="${c.nombre}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Marca *</label>
                                <input type="text" th:field="*{marca}"
                                       class="form-control" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Modelo *</label>
                                <input type="text" th:field="*{modelo}"
                                       class="form-control" required/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Precio Venta (S/) *</label>
                                <input type="number" th:field="*{precioVenta}"
                                       class="form-control" required step="0.01" min="0.01"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Stock *</label>
                                <input type="number" th:field="*{stock}"
                                       class="form-control" required min="0"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Stock mínimo *</label>
                                <input type="number" th:field="*{stockMinimo}"
                                       class="form-control" required min="1"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Estado</label>
                                <select th:field="*{estado}" class="form-select">
                                    <option value="1">Activo</option>
                                    <option value="0">Inactivo</option>
                                </select>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Descripción</label>
                                <textarea th:field="*{descripcion}"
                                          class="form-control" rows="2"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">URL de imagen</label>
                                <input type="text" th:field="*{imagenUrl}"
                                       class="form-control"/>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save me-1"></i>Actualizar
                            </button>
                            <a th:href="@{/productos}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
