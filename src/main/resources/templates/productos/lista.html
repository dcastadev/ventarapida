<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-box-seam me-2 text-primary"></i>Productos
        </h4>
        <a th:href="@{/productos/nuevo}" class="btn btn-primary"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle me-1"></i>Nuevo Producto
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Marca / Modelo</th>
                            <th class="text-end">Precio</th>
                            <th class="text-center">Stock</th>
                            <th>Estado</th>
                            <th class="text-center" sec:authorize="hasRole('ADMIN')">
                                Acciones
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${productos}">
                            <td class="text-muted small align-middle"
                                th:text="${p.idProducto}"></td>
                            <td class="align-middle">
                                <span class="fw-semibold" th:text="${p.nombre}"></span>
                            </td>
                            <td class="align-middle">
                                <span class="badge bg-info text-dark"
                                      th:text="${p.categoria?.nombre}"></span>
                            </td>
                            <td class="align-middle small"
                                th:text="${p.marca + ' / ' + p.modelo}"></td>
                            <td class="text-end align-middle fw-semibold"
                                th:text="${'S/ ' + p.precioVenta}"></td>
                            <td class="text-center align-middle">
                                <span th:classappend="${p.stock <= p.stockMinimo}
                                      ? 'badge bg-danger' : 'badge bg-success'"
                                      th:text="${p.stock}"></span>
                            </td>
                            <td class="align-middle">
                                <span th:if="${p.estado == '1'}"
                                      class="badge bg-success">Activo</span>
                                <span th:unless="${p.estado == '1'}"
                                      class="badge bg-secondary">Inactivo</span>
                            </td>
                            <td class="text-center align-middle"
                                sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/productos/editar/{id}(id=${p.idProducto})}"
                                   class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/productos/eliminar/{id}(id=${p.idProducto})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Desactivar este producto?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(productos)}">
                            <td colspan="8" class="text-center text-muted py-4">
                                No hay productos registrados
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</section>
</body>
</html>
