<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">

    <h4 class="fw-bold mb-4">
        <i class="bi bi-cart-plus me-2 text-primary"></i>Nueva Venta
    </h4>

    <form th:action="@{/ventas/registrar}" method="post" id="formVenta">
        <div class="row g-4">

            <!-- Columna izquierda: datos de la venta -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-primary text-white">
                        <h6 class="mb-0"><i class="bi bi-info-circle me-1"></i>Datos de Venta</h6>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cliente *</label>
                            <select name="idCliente" class="form-select" required>
                                <option value="">-- Selecciona cliente --</option>
                                <option th:each="c : ${clientes}"
                                        th:value="${c.idCliente}"
                                        th:text="${c.apellidos + ', ' + c.nombres + ' (' + c.nroDoc + ')'}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tipo Comprobante *</label>
                            <select name="tipoCompro" class="form-select" required>
                                <option value="BOLETA">Boleta</option>
                                <option value="FACTURA">Factura</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Observación</label>
                            <textarea name="observacion" class="form-control" rows="2"
                                      placeholder="Opcional"></textarea>
                        </div>
                        <!-- Totales calculados -->
                        <div class="border-top pt-3">
                            <div class="d-flex justify-content-between mb-1">
                                <span class="text-muted">Subtotal:</span>
                                <strong>S/ <span id="lblSubtotal">0.00</span></strong>
                            </div>
                            <div class="d-flex justify-content-between mb-1">
                                <span class="text-muted">IGV (18%):</span>
                                <strong>S/ <span id="lblIgv">0.00</span></strong>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span class="fw-bold fs-5">TOTAL:</span>
                                <span class="fw-bold fs-5 text-primary">
                                    S/ <span id="lblTotal">0.00</span>
                                </span>
                            </div>
                        </div>
                        <!-- Campos hidden de totales -->
                        <input type="hidden" name="subtotal" id="inpSubtotal"/>
                        <input type="hidden" name="igv"      id="inpIgv"/>
                        <input type="hidden" name="total"    id="inpTotal"/>
                    </div>
                </div>
            </div>

            <!-- Columna derecha: agregar productos -->
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h6 class="mb-0"><i class="bi bi-box-seam me-1"></i>Agregar Productos</h6>
                    </div>
                    <div class="card-body">
                        <!-- Selector de producto -->
                        <div class="row g-2 mb-3">
                            <div class="col-md-5">
                                <select id="selProducto" class="form-select">
                                    <option value="">-- Producto --</option>
                                    <option th:each="p : ${productos}"
                                            th:value="${p.idProducto}"
                                            th:text="${p.nombre + ' — S/ ' + p.precioVenta}"
                                            th:data-precio="${p.precioVenta}"
                                            th:data-stock="${p.stock}"
                                            th:data-nombre="${p.nombre}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <input type="number" id="inpCantidad"
                                       class="form-control" placeholder="Cant." min="1" value="1"/>
                            </div>
                            <div class="col-md-2">
                                <input type="number" id="inpDescuento"
                                       class="form-control" placeholder="Desc." min="0"
                                       step="0.01" value="0"/>
                            </div>
                            <div class="col-md-3">
                                <button type="button" class="btn btn-success w-100"
                                        onclick="agregarProducto()">
                                    <i class="bi bi-plus-circle me-1"></i>Agregar
                                </button>
                            </div>
                        </div>

                        <!-- Tabla del carrito -->
                        <table class="table table-sm table-bordered" id="tablaCarrito">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Producto</th>
                                    <th class="text-end">Precio</th>
                                    <th class="text-center">Cant.</th>
                                    <th class="text-end">Desc.</th>
                                    <th class="text-end">Subtotal</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tbodyCarrito">
                                <tr id="trVacio">
                                    <td colspan="7" class="text-center text-muted py-3">
                                        Agrega productos al carrito
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <!-- Container para inputs hidden del detalle -->
                        <div id="inputsDetalle"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary btn-lg"
                            onclick="return validarCarrito()">
                        <i class="bi bi-check-circle me-1"></i>Confirmar Venta
                    </button>
                </div>
            </div>
        </div>
    </form>
</section>

<script>
let carrito = [];

function agregarProducto() {
    const sel      = document.getElementById('selProducto');
    const cantidad = parseInt(document.getElementById('inpCantidad').value);
    const descuento= parseFloat(document.getElementById('inpDescuento').value) || 0;

    if (!sel.value) { alert('Selecciona un producto'); return; }

    const opt    = sel.options[sel.selectedIndex];
    const precio = parseFloat(opt.dataset.precio);
    const stock  = parseInt(opt.dataset.stock);
    const nombre = opt.dataset.nombre;
    const id     = sel.value;

    if (cantidad < 1 || cantidad > stock) {
        alert('Cantidad inválida. Stock disponible: ' + stock);
        return;
    }

    // Verificar si ya está en el carrito
    const existente = carrito.find(i => i.idProducto === id);
    if (existente) {
        if (existente.cantidad + cantidad > stock) {
            alert('No hay suficiente stock'); return;
        }
        existente.cantidad += cantidad;
        existente.subtotal  = calcularSubtotal(existente.precioUnit, existente.cantidad, existente.descuento);
    } else {
        carrito.push({
            idProducto:    id,
            nombreProducto: nombre,
            precioUnit:    precio,
            cantidad:      cantidad,
            descuento:     descuento,
            subtotal:      calcularSubtotal(precio, cantidad, descuento)
        });
    }
    renderCarrito();
}

function calcularSubtotal(precio, cantidad, descuento) {
    return Math.round(((precio - descuento) * cantidad) * 100) / 100;
}

function eliminarLinea(idx) {
    carrito.splice(idx, 1);
    renderCarrito();
}

function renderCarrito() {
    const tbody = document.getElementById('tbodyCarrito');
    const trVacio = document.getElementById('trVacio');
    const inputsDiv = document.getElementById('inputsDetalle');

    tbody.innerHTML = '';
    inputsDiv.innerHTML = '';

    if (carrito.length === 0) {
        tbody.innerHTML = '<tr id="trVacio"><td colspan="7" class="text-center text-muted py-3">Agrega productos al carrito</td></tr>';
        actualizarTotales(0);
        return;
    }

    let subtotalTotal = 0;
    carrito.forEach((item, i) => {
        subtotalTotal += item.subtotal;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${i+1}</td>
            <td>${item.nombreProducto}</td>
            <td class="text-end">S/ ${item.precioUnit.toFixed(2)}</td>
            <td class="text-center">${item.cantidad}</td>
            <td class="text-end">S/ ${item.descuento.toFixed(2)}</td>
            <td class="text-end fw-semibold">S/ ${item.subtotal.toFixed(2)}</td>
            <td class="text-center">
                <button type="button" class="btn btn-sm btn-danger"
                        onclick="eliminarLinea(${i})">
                    <i class="bi bi-x"></i>
                </button>
            </td>`;
        tbody.appendChild(tr);

        // Agregar inputs hidden para enviar al servidor
        inputsDiv.innerHTML += `
            <input type="hidden" name="detalles[${i}].idProducto"     value="${item.idProducto}"/>
            <input type="hidden" name="detalles[${i}].nombreProducto" value="${item.nombreProducto}"/>
            <input type="hidden" name="detalles[${i}].precioUnit"     value="${item.precioUnit}"/>
            <input type="hidden" name="detalles[${i}].cantidad"       value="${item.cantidad}"/>
            <input type="hidden" name="detalles[${i}].descuento"      value="${item.descuento}"/>
            <input type="hidden" name="detalles[${i}].subtotal"       value="${item.subtotal}"/>`;
    });
    actualizarTotales(subtotalTotal);
}

function actualizarTotales(subtotal) {
    const igv   = Math.round(subtotal * 0.18 * 100) / 100;
    const total = Math.round((subtotal + igv) * 100) / 100;
    document.getElementById('lblSubtotal').textContent = subtotal.toFixed(2);
    document.getElementById('lblIgv').textContent      = igv.toFixed(2);
    document.getElementById('lblTotal').textContent    = total.toFixed(2);
    document.getElementById('inpSubtotal').value = subtotal.toFixed(2);
    document.getElementById('inpIgv').value      = igv.toFixed(2);
    document.getElementById('inpTotal').value    = total.toFixed(2);
}

function validarCarrito() {
    if (carrito.length === 0) {
        alert('Debes agregar al menos un producto al carrito');
        return false;
    }
    return true;
}
</script>
</body>
</html>
