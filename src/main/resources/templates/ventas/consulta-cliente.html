<!-- consulta-cliente.html -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <h4 class="fw-bold mb-4">
        <i class="bi bi-search me-2 text-primary"></i>Ventas por Cliente
    </h4>
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/consultas/por-cliente}" method="get"
                  class="row g-3 align-items-end">
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Selecciona el cliente</label>
                    <select name="idCliente" class="form-select" required>
                        <option value="">-- Todos los clientes --</option>
                        <option th:each="c : ${clientes}"
                                th:value="${c.idCliente}"
                                th:text="${c.apellidos + ', ' + c.nombres}"
                                th:selected="${c.idCliente == idCliente}">
                        </option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search me-1"></i>Buscar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${ventas != null}">
        <p class="text-muted">
            Cliente: <strong th:text="${clienteSeleccionado?.apellidos + ', ' + clienteSeleccionado?.nombres}"></strong>
            — <span th:text="${ventas.size()}"></span> venta(s) encontrada(s)
        </p>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th>Comprobante</th>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th class="text-end">Total</th>
                            <th class="text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${ventas}">
                            <td th:text="${v.serie + '-' + v.correlativo}" class="fw-semibold"></td>
                            <td th:text="${#temporals.format(v.fechaVenta,'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${v.tipoCompro=='BOLETA'} ? 'bg-info' : 'bg-warning text-dark'"
                                      th:text="${v.tipoCompro}"></span>
                            </td>
                            <td class="text-end fw-semibold"
                                th:text="${'S/ ' + v.total}"></td>
                            <td class="text-center">
                                <a th:href="@{/ventas/detalle/{id}(id=${v.idVenta})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(ventas)}">
                            <td colspan="5" class="text-center text-muted py-4">
                                No se encontraron ventas
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</body>
</html>
