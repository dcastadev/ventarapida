<!-- ===================== ventas/detalle.html ===================== -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-receipt me-2 text-success"></i>Comprobante de Venta
        </h4>
        <a th:href="@{/ventas/nueva}" class="btn btn-primary">
            <i class="bi bi-cart-plus me-1"></i>Nueva Venta
        </a>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white">
                    <h6 class="mb-0">Datos del comprobante</h6>
                </div>
                <div class="card-body">
                    <table class="table table-sm mb-0">
                        <tr>
                            <td class="text-muted">Comprobante</td>
                            <td class="fw-bold">
                                <span th:text="${venta.tipoCompro}"></span>
                                <span th:text="${venta.serie}"></span>-
                                <span th:text="${#strings.toString(venta.correlativo)}"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted">Cliente</td>
                            <td th:text="${venta.cliente.apellidos + ', ' + venta.cliente.nombres}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">Documento</td>
                            <td th:text="${venta.cliente.nroDoc}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">Fecha</td>
                            <td th:text="${#temporals.format(venta.fechaVenta,'dd/MM/yyyy HH:mm')}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">Subtotal</td>
                            <td th:text="${'S/ ' + venta.subtotal}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">IGV (18%)</td>
                            <td th:text="${'S/ ' + venta.igv}"></td>
                        </tr>
                        <tr class="table-success">
                            <td class="fw-bold fs-5">TOTAL</td>
                            <td class="fw-bold fs-5" th:text="${'S/ ' + venta.total}"></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h6 class="mb-0">Detalle de productos</h6>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Producto</th>
                                <th class="text-center">Cant.</th>
                                <th class="text-end">Precio</th>
                                <th class="text-end">Desc.</th>
                                <th class="text-end">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d : ${detalles}">
                                <td th:text="${d.producto.nombre}"></td>
                                <td class="text-center" th:text="${d.cantidad}"></td>
                                <td class="text-end" th:text="${'S/ ' + d.precioUnit}"></td>
                                <td class="text-end" th:text="${'S/ ' + d.descuento}"></td>
                                <td class="text-end fw-semibold" th:text="${'S/ ' + d.subtotal}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
