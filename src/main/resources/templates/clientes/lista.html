<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-people me-2 text-success"></i>Clientes
        </h4>
        <a th:href="@{/clientes/nuevo}" class="btn btn-success">
            <i class="bi bi-plus-circle me-1"></i>Nuevo Cliente
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-success">
                        <tr>
                            <th>ID</th>
                            <th>Apellidos y Nombres</th>
                            <th>Tipo Doc.</th>
                            <th>N° Documento</th>
                            <th>Email</th>
                            <th>Celular</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${clientes}">
                            <td class="text-muted small align-middle"
                                th:text="${c.idCliente}"></td>
                            <td class="align-middle fw-semibold"
                                th:text="${c.apellidos + ', ' + c.nombres}"></td>
                            <td class="align-middle">
                                <span class="badge bg-secondary"
                                      th:text="${c.tipoDoc}"></span>
                            </td>
                            <td class="align-middle"
                                th:text="${c.nroDoc}"></td>
                            <td class="align-middle small"
                                th:text="${c.email}"></td>
                            <td class="align-middle"
                                th:text="${c.celular}"></td>
                            <td class="align-middle">
                                <span th:if="${c.estado == '1'}"
                                      class="badge bg-success">Activo</span>
                                <span th:unless="${c.estado == '1'}"
                                      class="badge bg-secondary">Inactivo</span>
                            </td>
                            <td class="text-center align-middle">
                                <a th:href="@{/clientes/editar/{id}(id=${c.idCliente})}"
                                   class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/clientes/eliminar/{id}(id=${c.idCliente})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Desactivar este cliente?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(clientes)}">
                            <td colspan="8" class="text-center text-muted py-4">
                                No hay clientes registrados
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</section>
</body>
</html>
