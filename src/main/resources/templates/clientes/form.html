<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-person-plus me-2"></i>
                        <span th:text="${modoEdicion} ? 'Editar Cliente' : 'Nuevo Cliente'"></span>
                    </h5>
                </div>
                <div class="card-body p-4">

                    <!-- GUARDAR NUEVO -->
                    <form th:if="${!modoEdicion}"
                          th:action="@{/clientes/guardar}" method="post"
                          th:object="${cliente}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Apellidos *</label>
                                <input type="text" th:field="*{apellidos}"
                                       class="form-control" required
                                       placeholder="Ej: García López"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nombres *</label>
                                <input type="text" th:field="*{nombres}"
                                       class="form-control" required
                                       placeholder="Ej: Juan Carlos"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Tipo Documento *</label>
                                <select th:field="*{tipoDoc}" class="form-select" required>
                                    <option value="">-- Tipo --</option>
                                    <option value="DNI">DNI</option>
                                    <option value="RUC">RUC</option>
                                    <option value="CE">Carnet Extranjería</option>
                                </select>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">N° Documento *</label>
                                <input type="text" th:field="*{nroDoc}"
                                       class="form-control" required
                                       placeholder="Sin puntos ni guiones"
                                       maxlength="12"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" th:field="*{email}"
                                       class="form-control"
                                       placeholder="correo@ejemplo.com"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Celular</label>
                                <input type="text" th:field="*{celular}"
                                       class="form-control"
                                       placeholder="9 dígitos"
                                       maxlength="9"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Dirección</label>
                                <input type="text" th:field="*{direccion}"
                                       class="form-control"
                                       placeholder="Dirección completa"/>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/clientes}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>

                    <!-- ACTUALIZAR -->
                    <form th:if="${modoEdicion}"
                          th:action="@{/clientes/actualizar}" method="post"
                          th:object="${cliente}">

                        <input type="hidden" th:field="*{idCliente}"/>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Apellidos *</label>
                                <input type="text" th:field="*{apellidos}"
                                       class="form-control" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nombres *</label>
                                <input type="text" th:field="*{nombres}"
                                       class="form-control" required/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Tipo Documento *</label>
                                <select th:field="*{tipoDoc}" class="form-select" required>
                                    <option value="DNI">DNI</option>
                                    <option value="RUC">RUC</option>
                                    <option value="CE">Carnet Extranjería</option>
                                </select>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">N° Documento *</label>
                                <input type="text" th:field="*{nroDoc}"
                                       class="form-control" required maxlength="12"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" th:field="*{email}"
                                       class="form-control"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Celular</label>
                                <input type="text" th:field="*{celular}"
                                       class="form-control" maxlength="9"/>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Dirección</label>
                                <input type="text" th:field="*{direccion}"
                                       class="form-control"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Estado</label>
                                <select th:field="*{estado}" class="form-select">
                                    <option value="1">Activo</option>
                                    <option value="0">Inactivo</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save me-1"></i>Actualizar
                            </button>
                            <a th:href="@{/clientes}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
